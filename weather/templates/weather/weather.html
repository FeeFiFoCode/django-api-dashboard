<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ title }}</h1>

    {% if error %}
        <p style="color: red;">Error: {{ error }}</p>
    {% else %}
        <ul>
            {% for bullet in bullets %}
                <li>{{ bullet }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <p>Data fetched at: {{ fetched_at }}</p>
</body>
</html>
